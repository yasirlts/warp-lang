name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always

jobs:
  # --- Rust compiler / MCP crates ------------------------------------------
  rust:
    name: fmt + clippy + test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt

      # Node is needed for the warp-commerce-types Rust codegen-drift gate
      # below (the generator is a node script, mirroring the TS/Python ones).
      - uses: actions/setup-node@v4
        with:
          node-version: "24"

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2

      - name: Check formatting
        run: cargo fmt --all -- --check

      - name: Clippy
        run: cargo clippy --all-targets --all-features -- -D warnings

      # `cargo test` runs only tests that do not require a live Restate
      # server. Workflow integration tests against a real Restate runtime
      # are marked `#[ignore]` and are run manually during phase gates.
      # Restate is not available in CI.
      - name: Test
        run: cargo test --all

      # Rust codegen-drift gate — regenerates the warp-commerce-types types and
      # transition tables from schema/ in --check mode and fails if the committed
      # generated Rust differs. Keeps the schema the single source of truth for
      # the Rust binding too (nobody can hand-edit generated output), exactly as
      # the TS/Python jobs gate their generators.
      - name: Rust codegen drift gate
        run: node crates/warp-commerce-types/scripts/generate-rust.mjs --check

  # --- TypeScript binding (@warp-lang/commerce-types) ----------------------
  ts:
    name: typescript binding
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: packages/commerce-types
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: npm
          cache-dependency-path: packages/commerce-types/package-lock.json

      - name: Install (clean, from lockfile)
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Test
        run: npm test

      - name: Build
        run: npm run build

      # Codegen-drift gate — regenerates from schema/ in --check mode and fails
      # if the committed generated types differ. This is what keeps the schema
      # the single source of truth: nobody can hand-edit generated output.
      - name: Codegen drift gate
        run: npm run codegen

  # --- MCP server (@warp-lang/commerce-mcp) --------------------------------
  # Thin wrapper that exposes the published commerce-types guardrail as Model
  # Context Protocol tools. Installs from its lockfile (pulling the published
  # @warp-lang/commerce-types + the MCP SDK), typechecks, builds the stdio
  # server, and runs the tool tests through an in-memory MCP client. Additive:
  # it depends on but does not modify commerce-types.
  commerce-mcp:
    name: mcp server
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: packages/commerce-mcp
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: npm
          cache-dependency-path: packages/commerce-mcp/package-lock.json

      - name: Install (clean, from lockfile)
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Test
        run: npm test

      - name: Build
        run: npm run build

  # --- Reference agent demo (@warp-lang/agent-demo) ------------------------
  # A real LLM agent naturally reaching for an over-refund, stopped by Warp via
  # the real MCP server, then self-correcting. CI runs the KEYLESS canned mode:
  # it replays the recorded agent turns while Warp's verdicts are computed live
  # by the real commerce-mcp server. Builds that server first (the demo spawns
  # it over stdio), then builds the demo, runs the disaster-averted test, and
  # runs the demo verbatim. Additive: depends on but does not modify
  # commerce-types or commerce-mcp.
  agent-demo:
    name: agent demo (canned)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "24"

      - name: Build commerce-mcp server (the demo spawns it)
        working-directory: packages/commerce-mcp
        run: |
          npm ci
          npm run build

      - name: Install + build demo
        working-directory: packages/agent-demo
        run: |
          npm ci
          npm run build

      - name: Test (canned replay + live Warp verdicts)
        working-directory: packages/agent-demo
        run: npm test

      - name: Run the keyless canned demo
        working-directory: packages/agent-demo
        run: node dist/index.js

  # --- Auxiliary packages (compose the published commerce-types) -----------
  # Each is a standalone package that wraps/uses the published
  # @warp-lang/commerce-types (or, for viz, reads the in-repo transition table).
  # Same shape as the mcp/agent-demo jobs: clean install, typecheck, test, build.
  commerce-metrics:
    name: metrics lib
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: packages/commerce-metrics
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: npm
          cache-dependency-path: packages/commerce-metrics/package-lock.json
      - name: Install (clean, from lockfile)
        run: npm ci
      - name: Typecheck
        run: npm run typecheck
      - name: Test
        run: npm test
      - name: Build
        run: npm run build

  commerce-registry:
    name: adapter registry
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: packages/commerce-registry
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: npm
          cache-dependency-path: packages/commerce-registry/package-lock.json
      - name: Install (clean, from lockfile)
        run: npm ci
      - name: Typecheck
        run: npm run typecheck
      - name: Test
        run: npm test
      - name: Build
        run: npm run build

  commerce-runtime:
    name: reference runtime
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: packages/commerce-runtime
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: npm
          cache-dependency-path: packages/commerce-runtime/package-lock.json
      - name: Install (clean, from lockfile)
        run: npm ci
      - name: Typecheck
        run: npm run typecheck
      - name: Test
        run: npm test
      - name: Build
        run: npm run build

  commerce-viz:
    name: viz renderer
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: packages/commerce-viz
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: npm
          cache-dependency-path: packages/commerce-viz/package-lock.json
      - name: Install (clean, from lockfile)
        run: npm ci
      - name: Typecheck
        run: npm run typecheck
      - name: Test
        run: npm test
      - name: Build
        run: npm run build

  commerce-coverage:
    name: coverage audit + enforce
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: packages/commerce-coverage
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: npm
          cache-dependency-path: packages/commerce-coverage/package-lock.json
      - name: Install (clean, from lockfile)
        run: npm ci
      - name: Typecheck
        run: npm run typecheck
      - name: Test
        run: npm test
      - name: Build
        run: npm run build
      # Dogfood the gate: enforce must PASS on a fully-guarded fixture...
      - name: Enforce passes on the clean fixture (exit 0)
        run: node dist/cli.js enforce --config enforce-fixtures/clean/warp.config.json
      # ...and must FAIL on a fixture with an unguarded declared sink.
      - name: Enforce fails on the gap fixture (must exit nonzero)
        run: |
          if node dist/cli.js enforce --config enforce-fixtures/gap/warp.config.json; then
            echo "::error::enforce should have FAILED on the gap fixture but exited 0"
            exit 1
          fi
          echo "enforce correctly failed (nonzero) on the unguarded gap fixture"

  # --- Python binding (warp-commerce-types) --------------------------------
  python:
    name: python binding
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: packages/commerce-types-py
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.9"
          cache: pip
          cache-dependency-path: packages/commerce-types-py/pyproject.toml

      # Upgrade pip first: PEP 660 editable installs of this pyproject-only
      # package require a modern pip (the stock pip on some runners is too old).
      - name: Upgrade pip
        run: python -m pip install --upgrade pip

      - name: Install with declared dev deps
        run: pip install -e ".[dev]"

      - name: Pytest
        run: pytest

      - name: Mypy
        run: mypy .

  # --- Schema spine (zero-dependency validator) ----------------------------
  schema:
    name: schema validator
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "24"

      # Validates that every schema parses, all $refs resolve, and the
      # transition canary is intact. Self-contained — no npm install needed.
      - name: Validate schema
        run: node schema/validate.mjs

  # --- Conformance suite (zero-dependency, validates against schema/) ------
  conformance:
    name: conformance suite
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "24"

      - name: Conformance runner (51 fixtures)
        run: node conformance/runner/run.mjs

      - name: Auxiliary-record coverage (5 records)
        run: node conformance/case-studies/validate-aux.mjs

  # --- Go binding (bindings/go) --------------------------------------------
  # Builds + vets + gofmt-checks + tests the Go binding, and runs the Go
  # codegen-drift gate. Node is needed because the generator is a node script,
  # mirroring the TS/Python/Rust generators.
  go:
    name: go binding
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "stable"

      - uses: actions/setup-node@v4
        with:
          node-version: "24"

      - name: Build
        working-directory: bindings/go
        run: go build ./...

      - name: Vet
        working-directory: bindings/go
        run: go vet ./...

      # gofmt -l prints any file that is not gofmt-clean; fail if it prints anything.
      - name: gofmt check
        working-directory: bindings/go
        run: test -z "$(gofmt -l .)"

      - name: Test
        working-directory: bindings/go
        run: go test ./...

      # Go codegen-drift gate — regenerates the Go types and transition tables
      # from schema/ in --check mode and fails if the committed generated Go
      # differs. Keeps the schema the single source of truth for the Go binding
      # too, exactly as the TS/Python/Rust jobs gate their generators.
      - name: Go codegen drift gate
        run: node bindings/go/generate-go.mjs --check

  # --- Cross-binding parity: TS, Python, Rust, and Go must agree on every fixture
  # Needs ALL FOUR bindings: the TS package built (crosscheck-ts imports dist/),
  # the Python package importable (crosscheck-python imports warp_commerce_types),
  # the Rust binding compiled (crosscheck.mjs invokes the crosscheck-rust binary
  # via cargo), and the Go toolchain (crosscheck.mjs invokes `go run` for the
  # crosscheck-go command).
  crosscheck:
    name: ts/python/rust/go cross-check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: npm
          cache-dependency-path: packages/commerce-types/package-lock.json

      - uses: actions/setup-python@v5
        with:
          python-version: "3.9"
          cache: pip
          cache-dependency-path: packages/commerce-types-py/pyproject.toml

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - uses: actions/setup-go@v5
        with:
          go-version: "stable"

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2

      - name: Build TS binding
        working-directory: packages/commerce-types
        run: |
          npm ci
          npm run build

      - name: Install Python binding
        working-directory: packages/commerce-types-py
        run: |
          python -m pip install --upgrade pip
          pip install -e .

      # Build the Rust binding up front so the cross-check's `cargo run` does not
      # pay first-compile cost inside the verdict capture.
      - name: Build Rust binding
        run: cargo build -p warp-commerce-types --bin crosscheck-rust

      # Build the Go binding up front so the cross-check's `go run` does not pay
      # first-compile cost inside the verdict capture.
      - name: Build Go binding
        working-directory: bindings/go
        run: go build ./...

      # Proves TS, Python, Rust, and Go produce the identical verdict on every
      # fixture runnable in all four (money-breakdown fixtures included since
      # B-1). Exits non-zero on any disagreement. The Go emitter is invoked with
      # /opt/homebrew/bin prepended to PATH for local macOS parity; on the Linux
      # runner `go` is already on PATH from setup-go.
      - name: Cross-check
        run: node conformance/tooling/crosscheck.mjs

      # Keeps the external-binding harness honest: run the TS binding's verdicts
      # through the generic score-adapter (the same path an external binding
      # uses) and assert a clean pass. Needs the TS dist built above.
      - name: External-harness worked example
        run: node conformance/tooling/test-score-adapter.mjs
