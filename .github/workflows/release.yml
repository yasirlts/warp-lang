name: Release

# Tag-triggered publish. Pushing a tag like `v1.0.0` runs the FULL conformance
# gate first; the packages publish ONLY if every gate job is green. The
# conformance suite IS the release gate — no green, no publish.
#
# Required repo secrets (Settings → Secrets and variables → Actions):
#   NPM_TOKEN   — npm GRANULAR access token (Read+Write, scoped to the warp-lang
#                 org). A granular token is REQUIRED: the account enforces
#                 2FA-on-write, and classic/automation-classic tokens hit
#                 `EOTP` ("requires a one-time password") in headless CI — which
#                 is exactly how the v1.0.0 npm publish failed. A granular token
#                 bypasses the interactive OTP. See RELEASING.md.
#   PYPI_TOKEN  — PyPI API token (publishes warp-commerce-types; no 2FA issue).
# This file contains secret REFERENCES only — never a literal token.
#
# Publish ordering: publish-npm runs first; publish-pypi `needs:` it, so the
# historically-fragile npm step gates the reliable PyPI step. If npm fails (e.g.
# EOTP), PyPI does NOT publish — preventing a split state where PyPI is ahead of
# npm (the v1.0.0 outcome). Recovery for a half-publish is in RELEASING.md.

on:
  push:
    tags:
      - "v*"

env:
  CARGO_TERM_COLOR: always

jobs:
  # ===========================================================================
  # GATE — identical to CI. Publish jobs `needs:` every one of these, so a tag
  # cannot publish unless the whole gate is green.
  # ===========================================================================

  rust:
    name: fmt + clippy + test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt
      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
      - name: Check formatting
        run: cargo fmt --all -- --check
      - name: Clippy
        run: cargo clippy --all-targets --all-features -- -D warnings
      - name: Test
        run: cargo test --all

  ts:
    name: typescript binding
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: packages/commerce-types
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: npm
          cache-dependency-path: packages/commerce-types/package-lock.json
      - name: Install (clean, from lockfile)
        run: npm ci
      - name: Typecheck
        run: npm run typecheck
      - name: Test
        run: npm test
      - name: Build
        run: npm run build
      - name: Codegen drift gate
        run: npm run codegen

  python:
    name: python binding
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: packages/commerce-types-py
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.9"
          cache: pip
          cache-dependency-path: packages/commerce-types-py/pyproject.toml
      - name: Upgrade pip
        run: python -m pip install --upgrade pip
      - name: Install with declared dev deps
        run: pip install -e ".[dev]"
      - name: Pytest
        run: pytest
      - name: Mypy
        run: mypy .

  schema:
    name: schema validator
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "24"
      - name: Validate schema
        run: node schema/validate.mjs

  conformance:
    name: conformance suite
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "24"
      - name: Conformance runner (51 fixtures)
        run: node conformance/runner/run.mjs
      - name: Auxiliary-record coverage (5 records)
        run: node conformance/case-studies/validate-aux.mjs

  crosscheck:
    name: ts/python cross-check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: npm
          cache-dependency-path: packages/commerce-types/package-lock.json
      - uses: actions/setup-python@v5
        with:
          python-version: "3.9"
          cache: pip
          cache-dependency-path: packages/commerce-types-py/pyproject.toml
      - name: Build TS binding
        working-directory: packages/commerce-types
        run: |
          npm ci
          npm run build
      - name: Install Python binding
        working-directory: packages/commerce-types-py
        run: |
          python -m pip install --upgrade pip
          pip install -e .
      - name: Cross-check
        run: node conformance/tooling/crosscheck.mjs

  # ===========================================================================
  # PUBLISH — only after the ENTIRE gate is green.
  # ===========================================================================

  publish-npm:
    name: publish npm
    needs: [rust, ts, python, schema, conformance, crosscheck]
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: packages/commerce-types
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "24"
          registry-url: "https://registry.npmjs.org"
          cache: npm
          cache-dependency-path: packages/commerce-types/package-lock.json
      - name: Guard — tag must match package version
        run: |
          PKG="v$(node -p "require('./package.json').version")"
          if [ "$PKG" != "${GITHUB_REF_NAME}" ]; then
            echo "::error::tag ${GITHUB_REF_NAME} != package version ${PKG}"
            exit 1
          fi
      - name: Install + build
        run: |
          npm ci
          npm run build
      - name: Precheck — NPM_TOKEN authenticates non-interactively
        # `npm whoami` is a read; it confirms the token is present and valid and
        # fails fast with a readable message instead of dying mid-publish. It
        # does NOT itself prove the token bypasses 2FA-on-write — but if it
        # passes here and `npm publish` below still EOTPs, the token is a
        # classic/automation token, not granular (see RELEASING.md).
        run: |
          if ! WHO="$(npm whoami 2>&1)"; then
            echo "::error::NPM_TOKEN failed to authenticate to npm ($WHO). Set NPM_TOKEN to a GRANULAR access token (Read+Write, scoped to the warp-lang org); classic tokens hit EOTP under 2FA-on-write. See RELEASING.md."
            exit 1
          fi
          echo "Authenticated to npm as: $WHO"
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
      - name: Publish to npm
        # --access public for a scoped package. No --otp: an OTP cannot live in a
        # workflow; headless publish relies on a granular token. If this step
        # fails with EOTP, the token is not granular — fix it (RELEASING.md) and
        # re-run, or publish manually with `npm publish --otp=<code>`.
        run: |
          if ! npm publish --access public; then
            echo "::error::npm publish failed. If the error above is EOTP / 'requires a one-time password', NPM_TOKEN is not a granular token that bypasses 2FA-on-write. Fix the token (RELEASING.md) and re-run this release, or publish manually: npm publish --otp=<code>."
            exit 1
          fi
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

  publish-pypi:
    name: publish pypi
    # Also needs publish-npm: the fragile npm publish gates the reliable PyPI one,
    # so a npm EOTP failure stops PyPI from racing ahead (no split state).
    needs: [rust, ts, python, schema, conformance, crosscheck, publish-npm]
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: packages/commerce-types-py
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          # 3.12 for tomllib (stdlib ≥3.11); the built wheel is py3-none-any and
          # the package still supports the floor declared in pyproject.
          python-version: "3.12"
      - name: Guard — tag must match package version
        run: |
          PKG="v$(python -c "import tomllib;print(tomllib.load(open('pyproject.toml','rb'))['project']['version'])")"
          if [ "$PKG" != "${GITHUB_REF_NAME}" ]; then
            echo "::error::tag ${GITHUB_REF_NAME} != package version ${PKG}"
            exit 1
          fi
      - name: Build wheel + sdist
        run: |
          python -m pip install --upgrade pip build
          python -m build
      - name: Publish to PyPI
        env:
          TWINE_USERNAME: __token__
          TWINE_PASSWORD: ${{ secrets.PYPI_TOKEN }}
        run: |
          python -m pip install twine
          twine upload dist/*
