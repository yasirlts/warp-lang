name: Release

# Tag-triggered publish. Pushing a tag like `v1.0.0` runs the FULL conformance
# gate first; the packages publish ONLY if every gate job is green. The
# conformance suite IS the release gate — no green, no publish.
#
# Required repo secrets (Settings → Secrets and variables → Actions):
#   NPM_TOKEN   — npm automation token (publishes @warp-lang/commerce-types)
#   PYPI_TOKEN  — PyPI API token        (publishes warp-commerce-types)
# This file contains secret REFERENCES only — never a literal token.

on:
  push:
    tags:
      - "v*"

env:
  CARGO_TERM_COLOR: always

jobs:
  # ===========================================================================
  # GATE — identical to CI. Publish jobs `needs:` every one of these, so a tag
  # cannot publish unless the whole gate is green.
  # ===========================================================================

  rust:
    name: fmt + clippy + test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt
      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
      - name: Check formatting
        run: cargo fmt --all -- --check
      - name: Clippy
        run: cargo clippy --all-targets --all-features -- -D warnings
      - name: Test
        run: cargo test --all

  ts:
    name: typescript binding
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: packages/commerce-types
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: npm
          cache-dependency-path: packages/commerce-types/package-lock.json
      - name: Install (clean, from lockfile)
        run: npm ci
      - name: Typecheck
        run: npm run typecheck
      - name: Test
        run: npm test
      - name: Build
        run: npm run build
      - name: Codegen drift gate
        run: npm run codegen

  python:
    name: python binding
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: packages/commerce-types-py
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.9"
          cache: pip
          cache-dependency-path: packages/commerce-types-py/pyproject.toml
      - name: Upgrade pip
        run: python -m pip install --upgrade pip
      - name: Install with declared dev deps
        run: pip install -e ".[dev]"
      - name: Pytest
        run: pytest
      - name: Mypy
        run: mypy .

  schema:
    name: schema validator
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "24"
      - name: Validate schema
        run: node schema/validate.mjs

  conformance:
    name: conformance suite
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "24"
      - name: Conformance runner (51 fixtures)
        run: node conformance/runner/run.mjs
      - name: Auxiliary-record coverage (5 records)
        run: node conformance/case-studies/validate-aux.mjs

  crosscheck:
    name: ts/python cross-check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: npm
          cache-dependency-path: packages/commerce-types/package-lock.json
      - uses: actions/setup-python@v5
        with:
          python-version: "3.9"
          cache: pip
          cache-dependency-path: packages/commerce-types-py/pyproject.toml
      - name: Build TS binding
        working-directory: packages/commerce-types
        run: |
          npm ci
          npm run build
      - name: Install Python binding
        working-directory: packages/commerce-types-py
        run: |
          python -m pip install --upgrade pip
          pip install -e .
      - name: Cross-check
        run: node conformance/tooling/crosscheck.mjs

  # ===========================================================================
  # PUBLISH — only after the ENTIRE gate is green.
  # ===========================================================================

  publish-npm:
    name: publish npm
    needs: [rust, ts, python, schema, conformance, crosscheck]
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: packages/commerce-types
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "24"
          registry-url: "https://registry.npmjs.org"
          cache: npm
          cache-dependency-path: packages/commerce-types/package-lock.json
      - name: Guard — tag must match package version
        run: |
          PKG="v$(node -p "require('./package.json').version")"
          if [ "$PKG" != "${GITHUB_REF_NAME}" ]; then
            echo "::error::tag ${GITHUB_REF_NAME} != package version ${PKG}"
            exit 1
          fi
      - name: Install + build
        run: |
          npm ci
          npm run build
      - name: Publish to npm
        run: npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

  publish-pypi:
    name: publish pypi
    needs: [rust, ts, python, schema, conformance, crosscheck]
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: packages/commerce-types-py
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          # 3.12 for tomllib (stdlib ≥3.11); the built wheel is py3-none-any and
          # the package still supports the floor declared in pyproject.
          python-version: "3.12"
      - name: Guard — tag must match package version
        run: |
          PKG="v$(python -c "import tomllib;print(tomllib.load(open('pyproject.toml','rb'))['project']['version'])")"
          if [ "$PKG" != "${GITHUB_REF_NAME}" ]; then
            echo "::error::tag ${GITHUB_REF_NAME} != package version ${PKG}"
            exit 1
          fi
      - name: Build wheel + sdist
        run: |
          python -m pip install --upgrade pip build
          python -m build
      - name: Publish to PyPI
        env:
          TWINE_USERNAME: __token__
          TWINE_PASSWORD: ${{ secrets.PYPI_TOKEN }}
        run: |
          python -m pip install twine
          twine upload dist/*
